name: quality

on:
  pull_request:
  push:
    branches:
      - main
      - main_go-cli
  workflow_dispatch:
permissions:
  contents: read
  pull-requests: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "~1.25"
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.10

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "~1.25"
      - name: test
        if: ${{ hashFiles('**/*.go') != '' }}
        run: make test

  coverage:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      code-quality: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "~1.25"
      - name: Install coverage converter
        run: go install github.com/t-yuki/gocover-cobertura@latest
      - name: Generate coverage and enforce threshold
        if: ${{ hashFiles('**/*.go') != '' }}
        run: make coverage
      - name: Convert to Cobertura XML
        if: ${{ hashFiles('**/*.go') != '' }}
        run: gocover-cobertura < coverage.out > cobertura.xml
      - name: Upload code coverage
        if: ${{ hashFiles('**/*.go') != '' }}
        uses: actions/upload-code-coverage@v1
        with:
          file: cobertura.xml
          language: Go
          label: code-coverage/go

  arch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "~1.25"
      - name: install go-arch-lint
        run: go install github.com/fe3dback/go-arch-lint@latest
      - name: arch
        if: ${{ hashFiles('**/*.go') != '' }}
        run: make arch

  mutation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "~1.25"
      - name: install gremlins
        run: go install github.com/go-gremlins/gremlins/cmd/gremlins@latest
      - name: mutation
        if: ${{ hashFiles('**/*.go') != '' }}
        run: make mutation
