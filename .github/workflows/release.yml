name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (for example: v1.2.3)"
        required: true
        type: string
      create_tag:
        description: "Create the tag if it does not exist"
        required: false
        default: true
        type: boolean

permissions:
  contents: read

concurrency:
  group: release-${{ github.workflow }}-${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Resolve release ref
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
      ref: ${{ steps.resolve.outputs.ref }}
    steps:
      - name: Resolve tag and ref
        id: resolve
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            TAG="$INPUT_TAG"
          else
            TAG="$REF_NAME"
          fi

          case "$TAG" in
            v[0-9]*.[0-9]*.[0-9]*) ;;
            *)
              echo "Invalid release tag: $TAG"
              echo "Expected format: vMAJOR.MINOR.PATCH"
              exit 1
              ;;
          esac

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "ref=refs/tags/$TAG" >> "$GITHUB_OUTPUT"

      - name: Validate or create tag for manual release
        if: ${{ github.event_name == 'workflow_dispatch' }}
        env:
          CREATE_TAG: ${{ github.event.inputs.create_tag }}
          TAG: ${{ steps.resolve.outputs.tag }}
          DISPATCH_REF: ${{ github.ref }}
          REPOSITORY: ${{ github.repository }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          REMOTE_URL="https://x-access-token:${GITHUB_TOKEN}@github.com/${REPOSITORY}.git"

          if git ls-remote --tags --exit-code "$REMOTE_URL" "refs/tags/${TAG}" >/dev/null; then
            echo "Tag ${TAG} already exists"
            exit 0
          fi

          if [ "$CREATE_TAG" != "true" ]; then
            echo "Tag ${TAG} does not exist and create_tag=false"
            exit 1
          fi

          mkdir release-tag-work
          git init release-tag-work
          git -C release-tag-work remote add origin "$REMOTE_URL"

          git -C release-tag-work fetch --depth=1 origin "$DISPATCH_REF"

          TARGET_SHA="$(git -C release-tag-work rev-parse FETCH_HEAD)"
          git -C release-tag-work tag "$TAG" "$TARGET_SHA"
          git -C release-tag-work push origin "refs/tags/${TAG}"
          echo "Created tag ${TAG} at ${TARGET_SHA} from ${DISPATCH_REF}"

  build:
    name: Build ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    needs: prepare
    permissions:
      contents: read
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.ref }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
          VERSION: ${{ needs.prepare.outputs.tag }}
        run: |
          set -euo pipefail
          TAG="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}"
          BIN_NAME="ralph_${TAG}_${GOOS}_${GOARCH}"
          if [ "$GOOS" = "windows" ]; then
            BIN_NAME="${BIN_NAME}.exe"
          fi
          COMMIT=$(git rev-parse --short HEAD 2>/dev/null || echo unknown)
          DATE=$(date -u '+%Y-%m-%dT%H:%M:%SZ')
          go build -trimpath -ldflags "-s -w -X github.com/iyaki/specralph/internal/buildversion.Version=${VERSION#v} -X github.com/iyaki/specralph/internal/buildversion.Commit=${COMMIT} -X github.com/iyaki/specralph/internal/buildversion.Date=${DATE}" -o "$BIN_NAME" ./cmd/ralph

      - name: Upload binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: ralph-${{ matrix.goos }}-${{ matrix.goarch }}
          path: ralph_*
          if-no-files-found: error
          retention-days: 7

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - prepare
      - build
    permissions:
      contents: write
    timeout-minutes: 10
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          set -euo pipefail
          cd dist
          sha256sum ralph_* | sort > checksums.txt

      - name: Create or update release
        uses: softprops/action-gh-release@v3.0.1
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          files: |
            dist/ralph_*
            dist/checksums.txt
          fail_on_unmatched_files: true
          generate_release_notes: true
